<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TralhaBank</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg, #0a0a0a, #1c1c1c);
    color:white;
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    color:#ffd700;
    margin-bottom:30px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.card{
    width:250px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    background:#222;
    box-shadow:0 0 15px rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin-bottom:15px;
    color:#ccc;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

.saldo{
    border-left:6px solid #00ff88;
}

.limite{
    border-left:6px solid #ffd700;
}

.fatura{
    border-left:6px solid #ff4d4d;
}

.verde{
    color:#00ff88;
}

.vermelho{
    color:#ff4d4d;
}

.formulario{
    max-width:600px;
    margin:auto;
    background:#1a1a1a;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,215,0,0.15);
}

.formulario h2{
    text-align:center;
    color:#ffd700;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input[type="number"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2c2c2c;
    color:white;
}

.opcoes{
    margin-top:10px;
}

.opcoes label{
    display:inline;
    margin-right:20px;
}

.checkbox{
    margin-top:20px;
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    border:none;
    border-radius:12px;
    background:#ffd700;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ff88;
    transform:scale(1.03);
}

</style>
</head>
<body>

<h1>🏆 TralhaBank</h1>

<div class="cards">

    <div class="card saldo">
        <h3>Saldo em Conta</h3>
        <p class="verde">R$ 15.450,00</p>
    </div>

    <div class="card limite">
        <h3>Limite do Cartão</h3>
        <p>R$ 8.000,00</p>
    </div>

    <div class="card fatura">
        <h3>Fatura Atual</h3>
        <p class="vermelho">R$ 2.350,00</p>
    </div>

</div>

<div class="formulario">

    <h2>Nova Transferência</h2>

    <form>

        <label for="valor">Valor da Transferência</label>
        <input type="number" id="valor" placeholder="Digite o valor">

        <label>Tipo de Transação</label>

        <div class="opcoes">
            <input type="radio" name="tipo" id="pix">
            <label for="pix">PIX</label>

            <input type="radio" name="tipo" id="ted">
            <label for="ted">TED</label>

            <input type="radio" name="tipo" id="doc">
            <label for="doc">DOC</label>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="salvar">
            <label for="salvar">
                Salvar este contato para futuras transferências
            </label>
        </div>

        <button type="submit">
            Transferir
        </button>

    </form>

</div>

</body>
</html>
